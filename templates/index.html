<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FashionMNIST CNN Classifier</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <!-- Load Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <h1>FashionMNIST CNN Classifier</h1>
            <p>Predict clothing types using a Convolutional Neural Network trained in Keras.</p>
        </header>

        <main class="main-content">
            <!-- Image Selection -->
            <section class="card upload-section">
                <h2>1. Select an Image</h2>
                <div class="actions">
                    <button id="btn-random" class="btn btn-secondary">Get Random Test Image</button>
                    <span class="divider">OR</span>
                    <label for="file-upload" class="btn btn-primary custom-file-upload">
                        Upload Image
                    </label>
                    <input id="file-upload" type="file" accept="image/*" />
                </div>
                <div class="image-preview-container">
                    <img id="image-preview" src="" alt="Selected Image" style="display: none;" />
                    <div id="image-placeholder">No image selected</div>
                </div>
                <p id="true-label" class="info-text"></p>
            </section>

            <!-- Prediction results -->
            <section class="card prediction-section">
                <h2>2. Analyze Image</h2>
                <button id="btn-predict" class="btn btn-primary" disabled>Predict Class</button>
                
                <div id="loading" class="loading" style="display: none;">
                    <div class="spinner"></div>
                    <p>Analyzing with CNN...</p>
                </div>

                <div id="result-container" class="result-container" style="display: none;">
                    <h3>Prediction:</h3>
                    <div class="prediction-highlight">
                        <span id="pred-class">T-Shirt</span>
                        <span id="pred-conf" class="confidence-badge">98.5%</span>
                    </div>
                    
                    <h4>Probabilities:</h4>
                    <div id="probabilities-bars" class="bars-container">
                        <!-- Bars will be inserted here -->
                    </div>
                </div>
                
                <div id="error-message" class="error-message" style="display: none;"></div>
            </section>
        </main>
    </div>

    <script src="{{ url_for('static', filename='main.js') }}"></script>
</body>
</html>
